<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avi Unplugged | Coming Soon</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top, rgba(255, 138, 0, 0.28), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 138, 0, 0.18), transparent 28%),
        linear-gradient(135deg, #02040a 0%, #0d111a 50%, #000000 100%);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
      position: relative;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .card {
      width: min(760px, 100%);
      text-align: center;
      padding: 48px 34px;
      border: 1px solid rgba(255, 138, 0, 0.35);
      border-radius: 28px;
      background: rgba(5, 7, 13, 0.82);
      box-shadow: 0 25px 90px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 80px;
      height: 80px;
      max-width: 80px;
      max-height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 138, 0, 0.7);
      box-shadow: 0 0 45px rgba(255, 138, 0, 0.32);
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: #ffb13b;
      font-weight: 800;
      letter-spacing: 0.22em;
      font-size: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(52px, 9vw, 96px);
      line-height: 0.92;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    .subtext {
      max-width: 600px;
      margin: 22px auto 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: clamp(18px, 2.4vw, 23px);
      line-height: 1.45;
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      padding: 15px 22px;
      border-radius: 12px;
      font-weight: 800;
      text-decoration: none;
    }

    .primary {
      color: #05070d;
      background: linear-gradient(135deg, #ff8a00, #ffb13b);
      box-shadow: 0 10px 30px rgba(255, 138, 0, 0.25);
    }

    .secondary {
      color: #ffb13b;
      border: 1px solid rgba(255, 138, 0, 0.35);
      background: rgba(255, 138, 0, 0.06);
    }

    .categories {
      margin-top: 38px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .categories span {
      padding: 9px 13px;
      border-radius: 999px;
      border: 1px solid rgba(255, 138, 0, 0.28);
      color: rgba(255, 255, 255, 0.82);
      font-size: 14px;
    }

    @media (max-width: 560px) {
      .card {
        padding: 36px 20px;
      }

      .logo {
        width: 80px;
        height: 80px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <img class="logo" src="avi-unplugged-logo.jpg" alt="Avi Unplugged Logo" />

      <p class="eyebrow">AVIUNPLUGGED.COM</p>

      <h1>Coming Soon</h1>

      <p class="subtext">
        Find Jewish trips, Shabbatons, networking events, school events, and tefillin opportunities — all in one place.
      </p>

      <div class="buttons">
        <a class="button primary" href="mailto:info@aviunplugged.com">Contact Avi</a>
        <a class="button secondary" href="https://wa.me/" target="_blank">Join WhatsApp</a>
      </div>

      <div class="categories">
        <span>Jewish Trips</span>
        <span>Shabbatons</span>
        <span>Networking</span>
        <span>School Events</span>
        <span>Tefillin</span>
      </div>
    </section>
  </main>
</body>
</html>
